name: Build and Deploy

run-name: >-
  ${{
    github.event_name == 'pull_request' && 'pull request build' ||
    github.event_name == 'push' && 'snapshot build' ||
    github.event_name == 'workflow_dispatch' && inputs.RELEASE_BUILD == 'true' && 'release build' ||
    'snapshot build'
  }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ "develop" ]
  workflow_dispatch:
    inputs:
      RELEASE_BUILD:
        description: 'Trigger a full Maven release (deploy, tag, push)'
        required: false
        default: false
        type: boolean
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [8, 17, 21, 25]
    name: build with Java ${{ matrix.java }}
    permissions:
      contents: write  # needed for pushes/tags during release

    env:
      # GitHub-native env consumed by cicd/gcviewer-script.sh
      CI_JDK_VERSION: openjdk${{ matrix.java }}
      CI_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
      CI_RELEASE_BUILD: ${{ github.event.inputs.RELEASE_BUILD || '' }}
      GPG_DIR: ${{ github.workspace }}/cicd/gpg
      # Optional: override branches/JDK if defaults differ
      # SNAPSHOT_BRANCH: develop
      # RELEASE_BRANCH: master
      # RELEASE_JDK: openjdk8
      DRY_RUN: ${{ vars.DRY_RUN || 'true' }} # default: skip deploy/push in this workflow

      # Secrets
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ENCRYPTION_PASSWORD: ${{ secrets.ENCRYPTION_PASSWORD }}
      CI_DEPLOY_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
      CI_DEPLOY_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
      SCP_USERNAME: ${{ secrets.SCP_USERNAME }}
      SCP_PASSWORD: ${{ secrets.SCP_PASSWORD }}
      GPG_KEYNAME: ${{ secrets.GPG_KEYNAME }} # used by maven-gpg-plugin
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }} # used by maven-gpg-plugin

    steps:
      - name: Checkout (full history for releases)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK ${{ matrix.java }} (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Prepare GUI display for tests (Xvfb)
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3

      - name: Show environment
        run: |
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF}"
          echo "CI_JDK_VERSION=${CI_JDK_VERSION}"
          echo "DRY_RUN=${DRY_RUN}"
          echo "CI_DEPLOY_USERNAME=${CI_DEPLOY_USERNAME}"
          echo "CI_DEPLOY_PASSWORD=${CI_DEPLOY_PASSWORD}"
          echo "SCP_USERNAME=${SCP_USERNAME}"
          echo "SCP_PASSWORD=${SCP_PASSWORD}"
          echo "CI_COMMIT_MESSAGE=${CI_COMMIT_MESSAGE}"
          echo "GPG_DIR=${GPG_DIR}"
          echo "GPG_KEYNAME=${GPG_KEYNAME}"
          echo "GPG_PASSPHRASE=${GPG_PASSPHRASE}"

      - name: Make build script executable
        run: chmod +x ./cicd/gcviewer-script.sh

      - name: Build/Verify/Release per branch logic
        shell: bash
        run: ./cicd/gcviewer-script.sh

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
          # Auto-detect coverage reports from Maven/Jacoco

      - name: Archive build artifacts (snapshot)
        if: success() && !env.ACT
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gcviewer-artifacts-java-${{ matrix.java }}
          path: |
            target/**/*.jar
            target/**/*.zip
            target/**/*.png
            target/**/*.csv
          if-no-files-found: ignore

